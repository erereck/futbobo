name: Publicar Futbobo no GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o projeto
        uses: actions/checkout@v4
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Instalar dependências
        run: npm ci
      - name: Configurar Pages
        uses: actions/configure-pages@v5
      - name: Gerar site estático
        run: npm run build
      - name: Preparar artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
